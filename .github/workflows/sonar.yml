name: Sonar Analysis

on:
  push:
    branches: [ "main", "lab3", "lab4", "lab5" ]
  pull_request:
    branches: [ "main", "lab3" , "lab4", "lab5" ]
  workflow_dispatch:

jobs:
  sonar:
    name: Build, Test and Sonar Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    defaults:
      run:
        working-directory: JtProject

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_NAME: CSDT-Ferry-Reservation
      SONAR_PROJECT_KEY: CSDT-ECI_CSDT-Ferry-Reservation
      SONAR_ORGANIZATION: csdt-eci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build tests
        run: |
          mvn -B clean test jacoco:report

      - name: Sonar scan
        shell: bash
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is not configured. Add it as a repository secret."
            exit 1
          fi

          HOST_URL="${SONAR_HOST_URL:-https://sonarcloud.io}"
          PROJECT_KEY="${SONAR_PROJECT_KEY}"
          PROJECT_NAME="${SONAR_PROJECT_NAME}"

          SONAR_ARGS=(
            "-Dsonar.host.url=${HOST_URL}"
            "-Dsonar.token=${SONAR_TOKEN}"
            "-Dsonar.projectKey=${PROJECT_KEY}"
            "-Dsonar.projectName=${PROJECT_NAME}"
            "-Dsonar.java.binaries=target/classes"
            "-Dsonar.coverage.exclusions=**"
            )

          if [ "${HOST_URL}" = "https://sonarcloud.io" ]; then
            if [ -z "${SONAR_ORGANIZATION}" ]; then
              echo "SONAR_ORGANIZATION is required for SonarCloud."
              exit 1
            fi
            SONAR_ARGS+=("-Dsonar.organization=${SONAR_ORGANIZATION}")
          fi

          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar "${SONAR_ARGS[@]}"